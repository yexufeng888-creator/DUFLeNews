<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0071e3"/>
      <stop offset="100%" stop-color="#4da6ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="900" cy="200" r="180" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <circle cx="900" cy="200" r="250" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <circle cx="300" cy="450" r="120" fill="none" stroke="rgba(0,113,227,0.08)" stroke-width="1"/>

  <!-- Accent line -->
  <rect x="80" y="180" width="80" height="3" rx="2" fill="url(#accent)"/>

  <!-- Main title -->
  <text x="80" y="260" font-family="'Noto Serif SC', serif" font-size="64" font-weight="900" fill="#f5f5f7" letter-spacing="-1">
    被世界听懂的
  </text>
  <text x="80" y="340" font-family="'Noto Serif SC', serif" font-size="64" font-weight="900" fill="#f5f5f7" letter-spacing="-1">
    <tspan fill="url(#accent)">"土味"</tspan>乡音
  </text>

  <!-- Subtitle -->
  <text x="80" y="410" font-family="'Inter', sans-serif" font-size="22" fill="#98989d" letter-spacing="0">
    小众方言叙事的国际传播新路径
  </text>

  <!-- Divider -->
  <line x1="80" y1="445" x2="380" y2="445" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Stats -->
  <g transform="translate(80, 500)">
    <text x="0" y="0" font-family="'Inter', sans-serif" font-size="36" font-weight="700" fill="#4da6ff">18亿</text>
    <text x="0" y="22" font-family="'Inter', sans-serif" font-size="13" fill="#86868b">累计票房</text>

    <text x="140" y="0" font-family="'Inter', sans-serif" font-size="36" font-weight="700" fill="#f5f5f7">62国</text>
    <text x="140" y="22" font-family="'Inter', sans-serif" font-size="13" fill="#86868b">海外发行</text>

    <text x="280" y="0" font-family="'Inter', sans-serif" font-size="36" font-weight="700" fill="#f5f5f7">9.2</text>
    <text x="280" y="22" font-family="'Inter', sans-serif" font-size="13" fill="#86868b">豆瓣评分</text>
  </g>

  <!-- Brand -->
  <text x="80" y="590" font-family="'Noto Serif SC', serif" font-size="14" fill="#636366">
    大连外国语大学 · 数据新闻大赛 · 方言电影传播研究
  </text>

  <!-- Right side: decorative globe -->
  <g transform="translate(920, 330)" opacity="0.15">
    <circle cx="0" cy="0" r="120" fill="none" stroke="#4da6ff" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="40" ry="120" fill="none" stroke="#4da6ff" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="120" ry="40" fill="none" stroke="#4da6ff" stroke-width="1"/>
    <circle cx="-30" cy="-20" r="6" fill="#4da6ff"/>
    <circle cx="20" cy="-10" r="4" fill="#0071e3"/>
    <circle cx="-10" cy="30" r="5" fill="#4da6ff"/>
    <circle cx="40" cy="15" r="3" fill="#0071e3"/>
  </g>
</svg>
