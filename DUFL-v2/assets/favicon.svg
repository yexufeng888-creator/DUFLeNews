<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background globe -->
  <circle cx="32" cy="32" r="30" fill="#1d1d1f"/>
  <!-- Latitude lines -->
  <ellipse cx="32" cy="32" rx="30" ry="12" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
  <ellipse cx="32" cy="20" rx="26" ry="8" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.6"/>
  <ellipse cx="32" cy="44" rx="22" ry="8" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.6"/>
  <!-- Longitude -->
  <ellipse cx="32" cy="32" rx="10" ry="30" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
  <!-- Accent dots representing dialect regions -->
  <circle cx="32" cy="24" r="2.5" fill="#0071e3"/>
  <circle cx="22" cy="30" r="2" fill="#4da6ff"/>
  <circle cx="40" cy="28" r="2.5" fill="#0071e3"/>
  <circle cx="28" cy="38" r="2" fill="#4da6ff"/>
  <circle cx="38" cy="40" r="1.8" fill="#0071e3"/>
  <circle cx="50" cy="35" r="1.5" fill="#4da6ff"/>
  <!-- Sound wave arcs -->
  <path d="M 20 22 Q 16 32 20 42" fill="none" stroke="#0071e3" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <path d="M 16 20 Q 10 32 16 44" fill="none" stroke="#4da6ff" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
  <path d="M 44 20 Q 48 32 44 44" fill="none" stroke="#0071e3" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
</svg>
