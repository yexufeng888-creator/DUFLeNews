<style>
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:40px 20px}
.auth-card{background:var(--card);border-radius:var(--radius-xl);padding:44px 36px;max-width:420px;width:100%;border:1px solid var(--border);box-shadow:var(--shadow-xl)}
.auth-card .logo{text-align:center;margin-bottom:28px}
.auth-card .logo .brand{font:600 18px var(--font-serif);display:block;margin-bottom:4px}
.auth-card .logo .sub{font-size:10px;color:var(--text-3);letter-spacing:.08em}

/* Tabs */
.auth-tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid var(--border)}
.auth-tabs button{flex:1;padding:10px;font-size:13px;font-weight:600;color:var(--text-3);border:none;background:none;cursor:pointer;transition:all .3s;position:relative}
.auth-tabs button.active{color:var(--accent)}
.auth-tabs button.active::after{content:'';position:absolute;bottom:-1px;left:25%;right:25%;height:2px;background:var(--accent);border-radius:1px}

/* Social login buttons */
.social-login{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.social-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px 16px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;transition:all .25s;border:1px solid var(--border);background:var(--card);color:var(--text)}
.social-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.social-btn img,.social-btn .s-icon{width:20px;height:20px;flex-shrink:0}
.social-btn.apple{background:#000;color:#fff;border-color:#000}
.social-btn.apple:hover{background:#1a1a1a}
.social-btn.google{border-color:#e0e0e0}
.social-btn.google:hover{background:#f8f8f8;border-color:#c0c0c0}
.social-btn.github{background:#24292e;color:#fff;border-color:#24292e}
.social-btn.github:hover{background:#1b1f23}
.social-btn.wechat{background:#07c160;color:#fff;border-color:#07c160}
.social-btn.wechat:hover{background:#06ad56}
.social-btn.phone{border:1px dashed var(--border);color:var(--text-2)}
.social-btn.phone:hover{border-color:var(--accent);color:var(--accent)}
[data-theme="dark"] .social-btn.google{border-color:#444}
[data-theme="dark"] .social-btn.google:hover{background:#222;border-color:#555}
[data-theme="dark"] .social-btn.phone{border-color:#444}

/* Divider */
.divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--text-3);font-size:10px;letter-spacing:.04em}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* Email form */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--text-2);margin-bottom:5px}
.form-group input{width:100%;padding:12px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;outline:none;transition:all .3s}
.form-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.form-group .hint{font-size:9px;color:var(--text-3);margin-top:3px}
.submit-btn{width:100%;padding:13px;border-radius:10px;background:var(--accent);color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .3s;margin-top:6px}
.submit-btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 16px rgba(196,69,54,.3)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* Messages */
.error-msg{background:var(--accent-soft);color:var(--accent);padding:10px 14px;border-radius:8px;font-size:11px;margin-bottom:14px;display:none;line-height:1.5}
.success-msg{background:rgba(76,175,80,.1);color:#4caf50;padding:10px 14px;border-radius:8px;font-size:11px;margin-bottom:14px;display:none;line-height:1.5}

/* Footer */
.auth-footer{text-align:center;margin-top:16px;font-size:10px;color:var(--text-3);line-height:1.6}
.auth-footer a{color:var(--accent);transition:opacity .2s}
.auth-footer a:hover{opacity:.8}
.back-link{text-align:center;margin-top:16px;font-size:11px}
.back-link a{color:var(--text-3);transition:color .2s}
.back-link a:hover{color:var(--text)}

/* WeChat QR modal */
.qr-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.qr-overlay.open{opacity:1;pointer-events:auto}
.qr-card{background:var(--card);border-radius:var(--radius-lg);padding:36px;text-align:center;max-width:340px;width:90%;border:1px solid var(--border)}
.qr-card h4{font:600 16px/1.3 var(--font-serif);margin-bottom:6px}
.qr-card .qr-desc{font-size:11px;color:var(--text-3);margin-bottom:20px}
.qr-card .qr-placeholder{width:200px;height:200px;margin:0 auto 16px;background:var(--border-soft);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:64px}
.qr-card button{padding:8px 24px;border-radius:100px;font-size:12px;color:var(--text-2);border:1px solid var(--border);background:var(--card);cursor:pointer}

/* Hamburger menu animation */
.menu-btn span{transition:all .3s;transform-origin:center}
.menu-btn.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
.menu-btn.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.menu-btn.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
</style>
</head>

<form id="loginForm" onsubmit="handleLogin(event)">

<script>
/* ===== Tab Switching ===== */
function switchTab(tab){
  const isLogin = tab==='login';
  document.getElementById('tabLogin').classList.toggle('active', isLogin);
  document.getElementById('tabRegister').classList.toggle('active', !isLogin);
  document.getElementById('loginForm').style.display = isLogin ? 'block' : 'none';
  document.getElementById('registerForm').style.display = isLogin ? 'none' : 'block';
  document.getElementById('socialLogin').style.display = isLogin ? 'flex' : 'none';
  hideMessages();
}

/* ===== Messages ===== */
function showError(msg){
  const el = document.getElementById('errorMsg');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('successMsg').style.display = 'none';
}
function showSuccess(msg){
  const el = document.getElementById('successMsg');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('errorMsg').style.display = 'none';
}
function hideMessages(){
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('successMsg').style.display = 'none';
}

/* ===== Social Login ===== */
function socialLoginSuccess(provider, id, name, email){
  const safeName = Auth.sanitize(name || (provider + '用户'));
  const session = {
    name: safeName,
    email: email || (id + '@' + provider + '.social'),
    provider: provider,
    socialId: id,
    loginTime: new Date().toISOString()
  };
  localStorage.setItem('dufl_session_v2', JSON.stringify(session));
  showSuccess(provider + ' 登录成功！正在跳转...');
  setTimeout(() => {
    const redirect = sessionStorage.getItem('redirect_after_login') || 'index.html';
    sessionStorage.removeItem('redirect_after_login');
    window.location.href = redirect;
  }, 600);
}

/* ---- Apple ---- */
function loginWithApple(){
  // Apple Sign In requires:
  // 1. Apple Developer account with Sign In with Apple enabled
  // 2. Service ID and redirect URI configured
  // 3. Backend to validate the identity token
  //
  // For production, use Apple's JS SDK:
  // https://developer.apple.com/documentation/sign_in_with_apple/sign_in_with_apple_js
  //
  // Quick demo: simulate with a prompt
  const name = prompt('Apple 登录 (演示)\n\n生产环境需配置 Apple Developer\n输入演示用户名：', '');
  if (name) socialLoginSuccess('Apple', 'apple_' + Date.now(), name, name.toLowerCase().replace(/\s/g,'')+'@apple.demo');
}

/* ---- Google ---- */
function triggerGoogleLogin(){
  // Google Identity Services — fully functional client-side
  if (window.google && google.accounts && google.accounts.id){
    google.accounts.id.prompt();
  } else {
    // Fallback: prompt for demo or show setup instructions
    const name = prompt('Google 登录\n\n正在加载 Google Identity Services...\n如果持续未加载，输入演示用户名：', '');
    if (name) socialLoginSuccess('Google', 'google_' + Date.now(), name, name.toLowerCase().replace(/\s/g,'')+'@gmail.demo');
  }
}

// Google callback — called by GIS on successful sign-in
function handleGoogleLogin(response){
  try {
    // Decode JWT credential to get user info
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    socialLoginSuccess('Google', payload.sub, payload.name, payload.email);
  } catch(e){
    console.error('Google login error:', e);
    showError('Google 登录解析失败，请重试');
  }
}

/* ---- GitHub ---- */
function loginWithGitHub(){
  // GitHub OAuth requires:
  // 1. GitHub OAuth App registration
  // 2. Client ID (safe to expose)
  // 3. Backend proxy for token exchange (client_secret cannot be exposed)
  //
  // For a static site, you can use a serverless function (Cloudflare Workers, Vercel Edge)
  // to proxy the token exchange.
  //
  // Demo mode:
  const name = prompt('GitHub 登录 (演示)\n\n生产环境需配置 GitHub OAuth App\n输入演示用户名：', '');
  if (name) socialLoginSuccess('GitHub', 'gh_' + Date.now(), name, name.toLowerCase()+'@github.demo');
}

/* ---- WeChat ---- */
function showWeChatQR(){ document.getElementById('qrOverlay').classList.add('open'); }
function closeQR(){ document.getElementById('qrOverlay').classList.remove('open'); }

/* ===== Email Login ===== */
async function handleLogin(e){
  e.preventDefault(); hideMessages();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '登录中...';
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  try {
    const result = await Auth.login(email, password);
    if (result.ok){
      showSuccess('登录成功！正在跳转...');
      setTimeout(() => {
        const redirect = sessionStorage.getItem('redirect_after_login') || 'index.html';
        sessionStorage.removeItem('redirect_after_login');
        window.location.href = redirect;
      }, 600);
    } else { showError(result.error); }
  } catch(err){ showError('登录失败：' + err.message); }
  btn.disabled = false; btn.textContent = '登 录';
}

/* ===== Email Register ===== */
async function handleRegister(e){
  e.preventDefault(); hideMessages();
  const btn = document.getElementById('regBtn');
  btn.disabled = true; btn.textContent = '注册中...';
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  try {
    const result = await Auth.register(name, email, password);
    if (result.ok){
      showSuccess('注册成功！正在跳转...');
      setTimeout(() => { window.location.href = 'index.html'; }, 600);
    } else { showError(result.error); }
  } catch(err){ showError('注册失败：' + err.message); }
  btn.disabled = false; btn.textContent = '注 册';
}

document.getElementById('loginEmail').focus();
</script>

<div style="display:flex;gap:6px;padding:10px 14px;border-top:1px solid var(--border)">
<input type="text" id="chatInputAll" placeholder="输入消息……" style="flex:1;padding:8px 12px;border-radius:100px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;outline:none" onkeydown="if(event.key==='Enter')sendChatMsg()">
<button onclick="sendChatMsg()" style="width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;font-size:13px;border:none;cursor:pointer;flex-shrink:0">➤</button>
</div></div></div>
<script>
var _chatOpen=false;
function toggleChat(){_chatOpen=!_chatOpen;var p=document.getElementById('chatPanel');p.style.opacity=_chatOpen?'1':'0';p.style.transform=_chatOpen?'translateY(0) scale(1)':'translateY(16px) scale(.95)';p.style.pointerEvents=_chatOpen?'auto':'none';if(_chatOpen){var inp=document.getElementById('chatInputAll');if(inp)inp.focus()}}
function sendChatMsg(){var inp=document.getElementById('chatInputAll');var m=inp.value.trim();if(!m)return;var b=document.getElementById('chatBodyAll');b.innerHTML+='<div style="max-width:85%;padding:10px 14px;border-radius:14px;font-size:12px;line-height:1.6;background:var(--accent);color:#fff;border-top-right-radius:4px;align-self:flex-end">'+Auth.sanitize(m)+'</div>';inp.value='';setTimeout(function(){b.innerHTML+='<div style="max-width:85%;padding:10px 14px;border-radius:14px;font-size:12px;line-height:1.6;background:var(--bg-alt);color:var(--text);border-top-left-radius:4px;align-self:flex-start">感谢留言！请通过研究机构邮箱联系我们，我们会尽快回复。</div>';b.scrollTop=b.scrollHeight},800);b.scrollTop=b.scrollHeight}
</script>


<!-- Region Selector -->
<div class="region-selector" style="text-align:center;padding:20px;margin-top:20px">
  <button id="regionTrigger" onclick="toggleRegionMenu()" style="font-size:12px;color:var(--text-2);padding:8px 18px;border-radius:100px;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;gap:8px">
    <span id="currentRegionLabel">地区</span>
    <span style="font-size:10px;opacity:.5">▾</span>
  </button>
  <div id="regionMenu" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.4);align-items:center;justify-content:center" onclick="if(event.target===this)toggleRegionMenu()">
    <div style="background:var(--card);border-radius:20px;padding:32px 28px;max-width:380px;width:90%;border:1px solid var(--border);box-shadow:0 24px 80px rgba(0,0,0,.15);text-align:center">
      <h3 style="font:600 18px/1.2 var(--font-serif);margin-bottom:6px">选择地区</h3>
      <p style="font-size:11px;color:var(--text-3);margin-bottom:20px">Select your region</p>
      <div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center">
        <button class="region-option" data-region="zh-CN" onclick="I18N.setRegion('zh-CN');toggleRegionMenu()" style="font-size:12px;padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text-2);cursor:pointer;transition:all .2s;white-space:nowrap;min-width:100px">中国大陆 · 简体中文</button>
        <button class="region-option" data-region="zh-HK" onclick="I18N.setRegion('zh-HK');toggleRegionMenu()" style="font-size:12px;padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text-2);cursor:pointer;transition:all .2s;white-space:nowrap;min-width:100px">中国香港 · 繁體中文</button>
        <button class="region-option" data-region="zh-TW" onclick="I18N.setRegion('zh-TW');toggleRegionMenu()" style="font-size:12px;padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text-2);cursor:pointer;transition:all .2s;white-space:nowrap;min-width:100px">中国台湾 · 繁體中文</button>
        <button class="region-option" data-region="ja" onclick="I18N.setRegion('ja');toggleRegionMenu()" style="font-size:12px;padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text-2);cursor:pointer;transition:all .2s;white-space:nowrap;min-width:100px">日本 · 日本語</button>
        <button class="region-option" data-region="ko" onclick="I18N.setRegion('ko');toggleRegionMenu()" style="font-size:12px;padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text-2);cursor:pointer;transition:all .2s;white-space:nowrap;min-width:100px">한국 · 한국어</button>
        <button class="region-option" data-region="ms" onclick="I18N.setRegion('ms');toggleRegionMenu()" style="font-size:12px;padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text-2);cursor:pointer;transition:all .2s;white-space:nowrap;min-width:100px">Malaysia</button>
        <button class="region-option" data-region="en-US" onclick="I18N.setRegion('en-US');toggleRegionMenu()" style="font-size:12px;padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text-2);cursor:pointer;transition:all .2s;white-space:nowrap;min-width:100px">United States</button>
        <button class="region-option" data-region="en-CA" onclick="I18N.setRegion('en-CA');toggleRegionMenu()" style="font-size:12px;padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text-2);cursor:pointer;transition:all .2s;white-space:nowrap;min-width:100px">Canada</button>
      </div>
      <button onclick="toggleRegionMenu()" style="margin-top:20px;font-size:12px;color:var(--text-3);padding:8px 24px;border-radius:100px;border:1px solid var(--border);background:var(--card);cursor:pointer">取消</button>
    </div>
  </div>
  <style>.region-option:hover{background:var(--accent-soft)!important;color:var(--accent)!important;border-color:var(--accent)!important;transform:scale(1.03)}.region-option.active{background:var(--accent)!important;color:#fff!important;border-color:var(--accent)!important}#regionMenu{display:none}#regionMenu.open{display:flex!important}
/* Hamburger menu animation */
.menu-btn span{transition:all .3s;transform-origin:center}
.menu-btn.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
.menu-btn.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.menu-btn.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
</style>
</div>
<script>function toggleRegionMenu(){document.getElementById('regionMenu').classList.toggle('open')};(function(){var r=I18N.getRegions().find(function(r){return r.code===I18N.getRegion()});if(r){var l=document.getElementById('currentRegionLabel');if(l)l.textContent=r.name.split('·')[0].trim()}})();</script>

</body>
</html>
